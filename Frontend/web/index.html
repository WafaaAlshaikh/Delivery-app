    }

    /* ✅ Loading spinner (shown before Flutter loads) */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F6F7F9;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .loading-logo-icon {
      width: 52px;
      height: 52px;
      background: #FF5A36;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      box-shadow: 0 8px 24px rgba(255, 90, 54, 0.30);
    }

    .loading-logo-text {
      font-family: 'Sora', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #12141A;
      letter-spacing: -0.5px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3.5px solid #E7E9ED;
      border-top-color: #FF5A36;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 20px;
      font-size: 13px;
      color: #98A1AF;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ✅ Pulse animation for the loading dot */
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      background: #FF5A36;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ✅ Ensure Flutter canvas takes full height */
    flutter-view {
      display: block;
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }

    /* ✅ Responsive adjustments */
    @media (max-width: 600px) {
      .loading-logo-text {
        font-size: 20px;
      }
      .loading-logo-icon {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }
      .loading-spinner {
        width: 28px;
        height: 28px;
      }
    }

    /* ✅ Dark mode support for the loading screen */
    @media (prefers-color-scheme: dark) {
      body {
        background: #12141A;
      }
      #loading-screen {
        background: #12141A;
      }
      .loading-logo-text {
        color: #FFFFFF;
      }
      .loading-spinner {
        border-color: #33363F;
        border-top-color: #FF5A36;
      }
      .loading-text {
        color: #5B6472;
      }
    }

    /* ✅ Prevent text selection on UI elements */
    .no-select {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    /* ✅ Smooth loading transition */
    #flutter-app {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #flutter-app.loaded {
      opacity: 1;
    }
  </style>

  <!-- ============================================
    ✅ HIDE LOADING SCREEN WHEN FLUTTER IS READY
    ============================================ -->
  <script>
    (function() {
      'use strict';

      // ✅ Hide loading screen when Flutter is ready
      function hideLoadingScreen() {
        const loadingScreen = document.getElementById('loading-screen');
        const flutterApp = document.getElementById('flutter-app');
        
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
          // Remove from DOM after transition
          setTimeout(() => {
            if (loadingScreen.parentNode) {
              loadingScreen.style.display = 'none';
            }
          }, 700);
        }

        if (flutterApp) {
          flutterApp.classList.add('loaded');
        }
      }

      // ✅ Listen for Flutter initialization complete
      document.addEventListener('flutter-initialized', hideLoadingScreen);

      // ✅ Fallback: hide after 8 seconds even if event doesn't fire
      setTimeout(hideLoadingScreen, 8000);

      // ✅ Also hide when the user interacts (just in case)
      document.addEventListener('click', function onFirstClick() {
        hideLoadingScreen();
        document.removeEventListener('click', onFirstClick);
      }, { once: true });

      // ✅ Touch/scroll events for mobile
      document.addEventListener('touchstart', function onFirstTouch() {
        hideLoadingScreen();
        document.removeEventListener('touchstart', onFirstTouch);
      }, { once: true });

      console.log('🚀 PickNGo Web App initialized');
      console.log('📱 Waiting for Flutter to load...');

    })();
  </script>
