name: frontend
description: "PickNGo - Multi-Vendor Delivery App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================================
  # 🎨 UI & Animation
  # ============================================================
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.9
  pinput: ^6.0.2
  fl_chart: ^1.2.0

  # ============================================================
  # 🧠 State Management
  # ============================================================
  riverpod: ^3.3.2
  flutter_riverpod: ^3.3.2

  # ============================================================
  # 🌐 Networking
  # ============================================================
  dio: ^5.4.0
  retrofit: ^4.0.1
  logger: ^2.0.1
  socket_io_client: ^3.1.6
  connectivity_plus: ^7.2.0

  # ============================================================
  # 💾 Local Storage
  # ============================================================
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.3.1

  # ============================================================
  # 🧭 Navigation
  # ============================================================
  go_router: ^17.3.0

  # ============================================================
  # ✅ Validation & Utilities
  # ============================================================
  email_validator: ^3.0.0
  fluttertoast: ^9.1.0
  file_picker: ^11.0.2

  # ============================================================
  # 🌍 Internationalization
  # ============================================================
  flutter_localizations:
    sdk: flutter
  intl: any

  # ============================================================
  # 🔥 Firebase (استخدام إصدارات متوافقة)
  # ============================================================
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  flutter_local_notifications: ^22.0.1

  # ============================================================
  # 🌐 Web Support
  # ============================================================
  flutter_web_plugins:
    sdk: flutter


  # ============================================================
  # 🗺️ Maps & Location
  # ============================================================
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.6.2+3
  location: ^8.0.1
  geolocator: ^14.0.3
  permission_handler: ^12.0.3
  geocoding: ^5.0.0

  # ============================================================
  # 📦 Other Utilities
  # ============================================================
  rxdart: ^0.28.0
  pdf: ^3.12.0
  printing: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  retrofit_generator: ^10.2.7
  json_serializable: ^6.7.1

# ============================================================
# 📱 Flutter Configuration
# ============================================================
flutter:
  uses-material-design: true

  assets:
    - assets/translations/en.json
    - assets/translations/ar.json

# ============================================================
# 📋 Dependency Overrides (لحل التعارضات)
# ============================================================
dependency_overrides:
  win32: ^5.5.0
  intl: ^0.19.0
