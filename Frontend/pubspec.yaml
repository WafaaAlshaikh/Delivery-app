name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI & Animation
  shimmer: ^3.0.0

  # State Management
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.1
  logger: ^2.0.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^12.1.3

  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  pinput: ^4.0.0

  # Validation
  email_validator: ^3.0.0

  # Others
  fluttertoast: ^8.2.4
  connectivity_plus: ^5.0.1
  fl_chart: ^1.2.0
  file_picker: ^11.0.2
  socket_io_client: ^3.1.6
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.0
  json_serializable: ^6.7.1

  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4+1
  location: ^5.0.3
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  geocoding: ^2.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/translations/en.json
    - assets/translations/ar.json
